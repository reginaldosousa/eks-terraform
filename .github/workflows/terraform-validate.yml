name: Terraform Validate, Lint, and Format

on:
  pull_request:
    paths:
      - '*.tf'
      - '.github/workflows/terraform-validate.yml'
  push:
    branches:
      - main
    paths:
      - '*.tf'
      - '.github/workflows/terraform-validate.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ~> 1.14

      - name: Terraform Format Check
        run: terraform fmt -check -diff -recursive .
        continue-on-error: true

      - name: Terraform Init (backend disabled for validation)
        run: terraform init -backend=false
        env:
          TF_IN_AUTOMATION: true

      - name: Terraform Validate
        run: terraform validate
        env:
          TF_IN_AUTOMATION: true

  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache plugin dir
        uses: actions/cache@v5
        with:
          path: ~/.tflint.d/plugins
          key: ubuntu-latest-tflint-${{ hashFiles('.tflint.hcl') }}

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6

      - name: Init TFLint
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run TFLint
        run: tflint -f compact .

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform
          output_format: github_cli
          quiet: false
          soft_fail: true
        continue-on-error: true

  format:
    name: Terraform Format
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ~> 1.14

      - name: Check Terraform Format
        id: fmt
        run: |
          terraform fmt -check -diff -recursive . > fmt_output.txt 2>&1 || echo "FORMAT_FAILED=true" >> $GITHUB_ENV
          cat fmt_output.txt

      - name: Comment PR with format results
        if: github.event_name == 'pull_request' && env.FORMAT_FAILED == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const fmtOutput = fs.readFileSync('fmt_output.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Format Issues\n\`\`\`\n${fmtOutput}\n\`\`\`\n\nPlease run \`terraform fmt -recursive .\` locally to fix formatting.`
            });
